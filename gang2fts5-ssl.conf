<VirtualHost *:80>
    ServerName ki.ganglion.ch
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName ki.ganglion.ch

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/ki.ganglion.ch/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ki.ganglion.ch/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # SSE streaming support for /api/ask
    ProxyTimeout 300
    SetEnv proxy-sendchunked 1

    ErrorLog ${APACHE_LOG_DIR}/ki.ganglion.ch-error.log
    CustomLog ${APACHE_LOG_DIR}/ki.ganglion.ch-access.log combined
</VirtualHost>
